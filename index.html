<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>轨迹周边 POI 交互式地图</title>
  <style>
    body { margin: 0; font-family: "Microsoft YaHei", Arial, sans-serif; color: #1f2933; background: #f5f7fb; }
    header { padding: 16px 22px 12px; background: white; border-bottom: 1px solid #d8dee9; }
    h1 { margin: 0 0 10px; font-size: 22px; }
    .controls { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
    label { font-size: 14px; color: #3b4656; }
    select { margin-left: 6px; padding: 7px 10px; border: 1px solid #b8c2d1; border-radius: 6px; background: white; }
    .note { margin-top: 8px; font-size: 13px; color: #52616f; }
    iframe { width: 100%; height: calc(100vh - 116px); border: 0; display: block; background: white; }
  </style>
</head>
<body>
  <header>
    <h1>轨迹周边 POI 交互式地图 / Interactive Route-buffer POI Map</h1>
    <div class="controls">
      <label>路线 / Route
        <select id="route"><option value="all">全部路线 / All routes</option>
<option value="museum_to_gongchenqiao_west">大运河博物馆-拱宸桥西 / Museum-Gongchen Bridge West</option>
<option value="xiaohe_park_to_dadou_road">小河公园-大兜路 / Xiaohe Park-Dadou Road</option></select>
      </label>
      <label>半径 / Radius
        <select id="radius"><option value="30">30m</option>
<option value="50">50m</option>
<option value="100">100m</option></select>
      </label>
    </div>
    <div class="note">可缩放、拖动、悬停查看 POI；点击图例可隐藏或显示某类 POI。30m 更接近步行即时感知，50m 适合主分析，100m 反映更宽的街区功能环境。</div>
  </header>
  <iframe id="map" src="all_30m_interactive.html"></iframe>
  <script>
    const pathMap = {
  "all_30": "all_30m_interactive.html",
  "all_50": "all_50m_interactive.html",
  "all_100": "all_100m_interactive.html",
  "museum_to_gongchenqiao_west_30": "museum_to_gongchenqiao_west_30m_interactive.html",
  "museum_to_gongchenqiao_west_50": "museum_to_gongchenqiao_west_50m_interactive.html",
  "museum_to_gongchenqiao_west_100": "museum_to_gongchenqiao_west_100m_interactive.html",
  "xiaohe_park_to_dadou_road_30": "xiaohe_park_to_dadou_road_30m_interactive.html",
  "xiaohe_park_to_dadou_road_50": "xiaohe_park_to_dadou_road_50m_interactive.html",
  "xiaohe_park_to_dadou_road_100": "xiaohe_park_to_dadou_road_100m_interactive.html"
};
    const route = document.getElementById("route");
    const radius = document.getElementById("radius");
    const frame = document.getElementById("map");
    function updateMap() {
      frame.src = pathMap[route.value + "_" + radius.value];
    }
    route.addEventListener("change", updateMap);
    radius.addEventListener("change", updateMap);
  </script>
</body>
</html>
